body:
  text: 隋天竺三藏法師闍那崛多譯如是我聞一時婆伽婆住王舍城耆闍崛山中與大比丘衆千二百五十人俱復有菩薩大衆一萬二千人俱阿逸多菩薩為首爾時世尊告彌勒菩薩言彌勒東方去此佛剎有十不可説諸佛剎億百千微塵等過諸佛剎有一佛土名曰解脫主世界彼世界內有一佛名曰虛空功德清淨微塵等目端正功德相光明華波頭摩琉璃光寶體香最上香供養訖種種莊嚴頂髻無量無邊日月光明願力莊嚴變化莊嚴法界出生無障礙王如來阿羅訶三藐三佛陀現在隨心欲行逍遙在處説法若善男子善女人犯四重五逆誹謗三寶及犯四波羅夷是人罪重假使如閻浮履地變為微塵一一微塵成於一劫是人有若干劫罪稱是一佛名號禮一拜者悉得滅除況復晝夜受持讀誦憶念不忘者是人功德不可思議而彼佛世界中有菩薩名無比無障礙王如來授彼菩薩記當得成佛號豪相日月光明華寶蓮華堅如金剛身毗盧遮那無障礙眼圓滿十方放光照一切佛剎相王如來阿羅訶三藐三佛陀善逝世間解無上士調御丈夫天人師佛世尊彼東方復有佛名曰一切莊嚴無垢光如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號南方有佛名曰辨才瓔珞思念如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號西方有佛名曰無垢月相王名稱如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號北方有佛名曰華莊嚴作光明如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號東南方有佛名曰作燈明如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號西南方有佛名曰寶上相名稱如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號西北方有佛名曰無畏觀如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號東北方有佛名曰無畏無怯毛孔不竪名稱如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號下方有佛名曰師子奮迅根如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號上方有佛名曰金光威王相似如來阿羅訶三藐三佛陀亦應當稱彼佛名亦修恭敬亦須稱其名號亦須心念彼佛名號爾時佛告彌勒若有正信善男子正信善女人稱此十二諸佛名號之時經於十日當修懺悔一切諸罪一切衆生所有功德皆隨喜勸請一切諸佛久住於世以諸善根回向法界是時即得滅一切諸罪得淨一切業障即得具足成就莊嚴一切佛土成就具足無畏復得具足莊嚴身相復得具足菩薩眷屬圍繞復得具足無量陀羅尼復得具足無量三昧復得具足如意佛剎莊嚴亦得具足無量善知識速得成就如上所説不增不減在於煩惱中行阿耨多羅三藐三菩提而得端正可喜果報亦得財寶充足常生大姓豪族種姓之家身相具足亦得善和眷屬圍繞爾時世尊重宣此義而説偈言若有善男子若善女人等受持此佛名生生世世中得他人愛敬光明威力大生處為人尊於後得成佛佛復告彌勒若有善男子善女人若當受持此佛名者亦須誦此陀羅尼呪多絰他一阿企二摩企三三曼多目企四燥帝育羯帝五尼陸帝六尼陸帝鉢脾七三摩余祇八質多毗跋帝九阿企十摩企十一摩陀禰十二毗拔帝十三三漫多求禰十四薩底耶羅彌十五育吉帝十六鉢育吉帝十七醯利彌利摩私隸十八阿喃迷十九遮迷二十頞質智二十一末質智二十二步支二十三阿羅醯二十四婆休眵二十五遮逾伽羅醯二十六醯摩婆帝二十七殊帝摩帝二十八達摩真帝二十九周多朋枳三十阿毗差脾三十一阿羅陀婆叉彌三十二娑揵陀毗拔帝三十三那摩薩婆三十四佛陀菩提薩多脾毗耶三十五悉田妒漫帶波陀三十六佛陀提瑟帝多三十七爾時世尊説是呪已重説偈言受持此呪者得值六十億現在十方佛常憶念是人一切受生處常遇善知識心欲所願者一切皆吉祥誦此陀羅尼常生諸佛前微妙蓮華上化生不受胎正念正行意增長智慧等一聞悉總持所聞不忘失受持此呪者獲得如是福誦此佛名者彼人所生處遠離諸惡道速得生善處得陀羅尼定最妙最勝處受持不忘失乃至於菩提皆由諸佛名及以陀羅尼若人施七寶滿千萬億剎受持此佛名福報過於彼行於菩提行恆常識宿命遠離諸衆難即得自在處常生有佛剎值佛聞正法得於信行心得是信心已常即供養佛值佛聞法已心生大歡喜得見諸佛已持妙供養具供養於諸佛受持佛名者千萬諸億劫捨離生死罪速成於佛道若人能至心七日誦佛名得於清淨眼能見無量佛能持此佛名即得無量福是人所生處天人常恭敬若人持佛名千萬億劫中不被他毀辱一切世界中名聞悉流布若人持佛名千萬億劫中天人常供養無有毀之者速得成佛道若人持佛名不生怯弱心智慧無諂曲常在諸佛前若人持佛名彼人所生處天龍諸夜叉乾闥緊那羅修羅迦樓羅及摩睺羅伽人與非人等常供養是人若人持佛名世世所生處常生富貴家丈夫相具足無有慳妬心猛健好布施身體諸毛孔常出諸妙香口中諸齒間復出氛氳香天赤栴檀香及諸餘香氣千萬億劫中常香無斷絶世世所生處其聲如梵天亦如迦陵頻命命等諸鳥持法王名者其福亦如是若人持佛名七寶華中生其華千億葉威光相具足若人持佛名父母諸眷屬和顏無諍訟永不生別離若有諸女人受持此經者捨離女人形轉生智男身得男子身已即成於菩提轉無上法輪隨意入涅槃若人持佛名刀杖不能害水火不焚漂縣官不能殺若人持佛名衆魔及波旬行住坐臥處不能得其便若人持佛名世世所生處身通遊虛空能至無邊剎面覩於諸佛能問甚深義彼等無量佛即知其心意為説微妙法授彼菩提記得聞授記已心生大歡喜即於諸佛教決定無有疑彼諸佛世尊所説甚深法其人聞法已受持永不失於後得成就六度及諸地無畏諸力等衆相及諸好佛剎及衆生任意隨所取生於彼剎中速能成正覺轉無上法輪隨意入涅槃若有善男子及善女人等受持此經者如上説功德若持此經者謹慎莫放逸聞如前福業若滿於一劫若減於一劫常須勤讀誦不生懈怠心我敕有如是此等諸佛者常住功德藏虛空雲中王常住於彼處若人聞佛名一劫減一劫聞已生敬心彼是最健人亦是大智慧亦是人中最亦是健丈夫於世大名聞是故我今言彌勒當聽我有大智慧人巧解方便者常勤不放逸恆近善知識得聞此經典後趣菩提道佛説此經已彌勒菩薩摩訶薩及諸菩薩衆大比丘衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等聞佛所説歡喜奉行
